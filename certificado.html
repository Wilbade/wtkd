<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="public/assets/images/logo.png">
    <title>Certificado de Exame — WTKD</title>
    
    <!-- Fontes Elegantes (Playfair Display para títulos, Dancing Script para texto oficial/cursivo) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@400;700&family=Playfair+Display:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        /* CSS Reset e Configuração para Impressão */
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body {
            font-family: 'Playfair Display', serif;
            background: #52525e;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }

        /* Container que segura as páginas */
        #certificados-container {
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 40px;
        }

        /* Estilo do Certificado Individual (A4 Paisagem) */
        .certificado {
            width: 297mm;
            height: 210mm;
            background: #fff;
            position: relative;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            overflow: hidden;
            /* Fundo sutil */
            background-image: radial-gradient(circle at center, rgba(255, 26, 26, 0.02) 0%, transparent 60%);
        }

        /* Barras Laterais com as tarjas coloridas nas extremidades */
        .barra-lateral {
            position: absolute;
            top: 0;
            bottom: 0;
            width: 15mm;
            display: flex;
            flex-direction: column;
            z-index: 1;
        }
        .barra-esquerda { left: 0; }
        .barra-direita { right: 0; }

        .tarja-amarela { background-color: #fce205; flex: 2; }
        .tarja-verde { background-color: #7cb342; flex: 1; }

        /* Moldura clássica com cantoneiras escuras */
        .moldura {
            position: absolute;
            top: 15mm;
            bottom: 15mm;
            left: 25mm; /* Distância para não sobrepor as barras laterais */
            right: 25mm;
            border: 2px solid #222;
            pointer-events: none;
            z-index: 2;
        }

        .cantoneira {
            position: absolute;
            width: 35px;
            height: 35px;
            border: 8px solid #222;
        }
        .cantoneira.top-left { top: -5px; left: -5px; border-right: none; border-bottom: none; }
        .cantoneira.top-right { top: -5px; right: -5px; border-left: none; border-bottom: none; }
        .cantoneira.bottom-left { bottom: -5px; left: -5px; border-right: none; border-top: none; }
        .cantoneira.bottom-right { bottom: -5px; right: -5px; border-left: none; border-top: none; }

        /* Conteúdo centralizado */
        .conteudo-interno {
            position: relative;
            z-index: 3;
            width: 85%;
            max-width: 220mm;
            padding: 0 20px;
        }

        .cabecalho { margin-bottom: 25px; }

        .titulo-escola {
            font-size: 26px;
            font-weight: 700;
            color: #111;
            letter-spacing: 4px;
            text-transform: uppercase;
        }
        .titulo-escola span { color: #b22222; }

        .subtitulo-escola {
            font-size: 13px;
            color: #555;
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-top: 5px;
        }

        .certificado-titulo {
            font-family: 'Dancing Script', cursive;
            font-size: 68px;
            font-weight: 700;
            color: #111;
            margin: 10px 0 30px 0;
            letter-spacing: 2px;
        }

        .texto-corpo {
            font-family: 'Dancing Script', cursive;
            font-size: 32px;
            color: #222;
            line-height: 1.6;
            text-align: justify;
            text-align-last: center;
            margin-bottom: 30px;
        }

        .nome-aluno {
            color: #b22222;
            font-weight: 700;
            font-size: 38px;
        }

        /* 3 Assinaturas */
        .assinaturas {
            display: flex;
            justify-content: space-between;
            width: 100%;
            margin-top: 60px;
        }

        .linha-assinatura {
            width: 28%;
            border-top: 1px solid #111;
            padding-top: 8px;
            font-size: 17px;
            color: #111;
            font-weight: 700;
            text-align: center;
        }
        .linha-assinatura span {
            display: block;
            font-size: 13px;
            font-weight: 400;
            color: #555;
            margin-top: 2px;
        }

        .selo-data {
            margin-top: 40px;
            font-size: 16px;
            color: #444;
            font-style: italic;
            text-align: center;
        }

        /* Texto Coreano Decorativo */
        .korean-bg {
            position: absolute;
            right: 40mm;
            bottom: 60mm;
            font-family: sans-serif;
            font-size: 60px;
            color: #222;
            line-height: 1.2;
            font-weight: bold;
            z-index: 1;
            opacity: 0.08;
        }

        .acoes {
            position: fixed;
            bottom: 30px;
            background: rgba(0,0,0,0.8);
            padding: 15px 30px;
            border-radius: 50px;
            display: flex;
            gap: 20px;
            z-index: 1000;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }

        .btn {
            background: #0a84ff;
            color: #fff;
            border: none;
            padding: 10px 20px;
            border-radius: 20px;
            font-weight: bold;
            font-size: 16px;
            cursor: pointer;
        }
        .btn:hover { background: #006ae6; }
        .btn-fechar { background: #3a3a3c; }

        @media print {
            body { background: transparent; padding: 0; }
            .acoes { display: none !important; }
            .certificado {
                box-shadow: none;
                margin: 0;
                page-break-after: always;
            }
            #certificados-container { gap: 0; }
            @page { size: A4 landscape; margin: 0; }
        }
        
        .loading {
            color: white;
            font-size: 24px;
            margin-top: 100px;
        }
    </style>
</head>
<body>

    <div class="acoes">
        <button class="btn btn-fechar" onclick="window.close()">Voltar</button>
        <button class="btn" onclick="window.print()">🖨️ Imprimir Agora</button>
    </div>

    <div id="certificados-container">
        <div class="loading">Gerando certificados, aguarde...</div>
    </div>

    <script>
        const SUPABASE_URL = "https://pkbusphlutnodgconbbc.supabase.co";
        const SUPABASE_KEY = "sb_publishable_AXK9wUTEpz-rSdmXYn2SUA_u8O_u6P0";
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        async function gerarCertificados() {
            const urlParams = new URLSearchParams(window.location.search);
            const idsParam = urlParams.get('ids');

            if (!idsParam) {
                document.getElementById('certificados-container').innerHTML = '<div class="loading">Nenhum ID de aluno fornecido.</div>';
                return;
            }

            const ids = idsParam.split(',').filter(id => id.trim() !== '');
            const container = document.getElementById('certificados-container');
            container.innerHTML = ''; 

            const hoje = new Date();
            const dataFormatada = hoje.toLocaleDateString('pt-BR', { day: '2-digit', month: 'long', year: 'numeric' });

            for (const idAluno of ids) {
                const { data: aluno } = await _supabase
                    .from('alunos')
                    .select('nome')
                    .eq('id', idAluno)
                    .single();

                const { data: exames } = await _supabase
                    .from('exames_notas')
                    .select('nota, faixa_avaliada, nome_real_avaliador')
                    .eq('id_aluno', idAluno)
                    .order('criado_em', { ascending: false })
                    .limit(1);

                if (aluno && exames && exames.length > 0) {
                    const exame = exames[0];
                    
                    const cert = document.createElement('div');
                    cert.className = 'certificado';
                    cert.innerHTML = `
                        <!-- Barras Laterais Coloridas -->
                        <div class="barra-lateral barra-esquerda">
                            <div class="tarja-amarela"></div>
                            <div class="tarja-verde"></div>
                        </div>
                        <div class="barra-lateral barra-direita">
                            <div class="tarja-amarela"></div>
                            <div class="tarja-verde"></div>
                        </div>

                        <!-- Moldura Interna com Cantoneiras -->
                        <div class="moldura">
                            <div class="cantoneira top-left"></div>
                            <div class="cantoneira top-right"></div>
                            <div class="cantoneira bottom-left"></div>
                            <div class="cantoneira bottom-right"></div>
                        </div>

                        <!-- Decoração Coreana -->
                        <div class="korean-bg">태<br>권<br>도</div>

                        <!-- Conteúdo Principal -->
                        <div class="conteudo-interno">
                            <div class="cabecalho">
                                <div class="titulo-escola">
                                    <img src="public/assets/images/logo.png" alt="Logo" style="height: 60px; margin-right: 15px; vertical-align: middle; border-radius: 50%;">
                                    WIL <span>TKD</span>
                                </div>
                                <div class="subtitulo-escola">Dojang • Escola de Artes Marciais</div>
                            </div>

                            <div class="certificado-titulo">Certificado de Graduação</div>

                            <div class="texto-corpo">
                                Conferimos o presente "CERTIFICADO DE GRADUAÇÃO" a <span class="nome-aluno">${aluno.nome}</span>, 
                                por sua aprovação no exame técnico oficial de promoção de faixa da escola WIL TKD, demonstrando excelência 
                                e domínio das técnicas necessárias, passando o titular, a partir desta data, 
                                à graduação de <strong>${exame.faixa_avaliada}</strong> com nota final <strong>${exame.nota} pontos</strong>.
                            </div>

                            <div class="assinaturas">
                                <div class="linha-assinatura">
                                    Wiliam Longo
                                    <span>Mestre / Diretor Geral</span>
                                </div>
                                <div class="linha-assinatura">
                                    ${exame.nome_real_avaliador || 'Avaliador 1'}
                                    <span>Avaliador Oficial</span>
                                </div>
                                <div class="linha-assinatura">
                                    &nbsp;
                                    <span>Avaliador 2</span>
                                </div>
                            </div>

                            <div class="selo-data">
                                São Paulo, ${dataFormatada}
                            </div>
                        </div>
                    `;
                    container.appendChild(cert);
                }
            }

            if (container.children.length === 0) {
                container.innerHTML = '<div class="loading">Nenhum exame encontrado para os IDs informados.</div>';
            } else {
                setTimeout(() => window.print(), 1200); /* Delay aumentado para garantir carregamento das fontes do Google */
            }
        }

        gerarCertificados();
    </script>
</body>
</html>
