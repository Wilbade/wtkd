<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Banca Multialunos — Wil Taekwondo</title>

    <!--
        DEPENDÊNCIA: Supabase JS v2 via CDN.
        Este arquivo instancia seu próprio cliente _supabase (com underscore)
        para evitar colisão de escopo com o "supabaseClient" global do conexao.js,
        pois o exame.html NÃO importa o conexao.js — é totalmente autossuficiente.
    -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <style>
        /* ======================================================
           DESIGN SYSTEM — VARIÁVEIS DE COR GLOBAIS
           Paleta dark com vermelho como cor de destaque (TKD)
        ====================================================== */
        :root {
            --primary:     #ff1a1a;
            --dark-bg:     #0a0a0a;
            --card-bg:     #141414;
            --card-border: #262626;
            --text-main:   #ffffff;
            --text-muted:  #a0a0a0;
        }

        body {
            font-family: '-apple-system', BlinkMacSystemFont, Arial, sans-serif;
            background-color: var(--dark-bg);
            color: var(--text-main);
            margin: 0; padding: 0;
        }

        /* Cabeçalho com nome do avaliador logado (vindo do localStorage) */
        header {
            background-color: rgba(0, 0, 0, 0.85);
            padding: 24px 48px;
            display: flex; justify-content: space-between; align-items: center;
            border-bottom: 1px solid var(--card-border);
        }

        /* Badge laranja que exibe o nome e graduação do avaliador autenticado */
        .banca-info { color: #ff9f0a; font-weight: bold; background: #1c1c1e; padding: 6px 12px; border-radius: 20px; }

        .main-container { max-width: 1300px; margin: 40px auto; padding: 0 24px; }

        /* Card genérico de seção (configuração + tabela de notas) */
        .card { background-color: var(--card-bg); border: 1px solid var(--card-border); border-radius: 12px; padding: 25px; margin-bottom: 25px; box-shadow: 0 4px 30px rgba(0,0,0,0.5); }

        /* Grade de 4 colunas para os seletores de candidatos (desktop) */
        .selectors-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 15px; margin-top: 15px; }

        /* Input/select padrão do sistema (dark) */
        .form-control { width: 100%; box-sizing: border-box; background-color: #0d0d0d; border: 1px solid var(--card-border); border-radius: 6px; padding: 10px; color: var(--text-main); }

        /* ======================================================
           TABELA DE AVALIAÇÃO — LAYOUT DESKTOP
           Exibe: Técnica | Max | Nota A1 | Nota A2 | Nota A3 | Nota A4
        ====================================================== */
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid var(--card-border); }
        th { background-color: #1c1c1e; text-transform: uppercase; font-size: 12px; color: var(--text-muted); }

        /* Input de nota individual por aluno/técnica */
        .nota-input { width: 70px; text-align: center; background: #000; border: 1px solid #3a3a3c; color: #fff; padding: 6px; border-radius: 4px; }

        /* Botão de submit do formulário de notas */
        .btn-submit { width: 100%; padding: 15px; background-color: var(--primary); color: #fff; border: none; border-radius: 6px; font-size: 16px; font-weight: bold; text-transform: uppercase; cursor: pointer; margin-top: 20px; }
        .btn-submit:hover { background-color: #cc0000; }

        /* Badge que exibe a faixa atual do candidato selecionado abaixo do select */
        .faixa-badge { display: inline-block; padding: 4px 8px; border-radius: 4px; font-size: 11px; font-weight: bold; margin-top: 5px; background: #2c2c2e; color: #fff; }

        /* ======================================================
           TABELA MOBILE — MODO CARD EMPILHADO
           Em telas < 768px, cada linha vira um card vertical
           com labels geradas via CSS ::before (sem JS extra)
        ====================================================== */
        @media (max-width: 768px) {
            header { padding: 15px 20px; flex-direction: column; gap: 10px; text-align: center; }
            .selectors-grid { grid-template-columns: 1fr; gap: 10px; }
            .main-container { padding: 0 10px; margin: 20px auto; }

            /* Transforma table em blocos (necessário para reordenar visualmente) */
            table, thead, tbody, th, td, tr { display: block; }

            /* Esconde o cabeçalho real — os labels são gerados via ::before nas células */
            thead tr { position: absolute; top: -9999px; left: -9999px; }

            /* Cada linha da tabela vira um card independente */
            tr { background: #1c1c1e; border: 1px solid var(--card-border); border-radius: 8px; margin-bottom: 15px; padding: 15px; }

            /* Coluna 1: Nome da técnica (destaque laranja) */
            td:nth-of-type(1) { font-size: 15px; color: #ff9f0a; border-bottom: 1px dashed #3a3a3c; padding-bottom: 10px; margin-bottom: 10px; font-weight: bold; }

            /* Coluna 2: Pontuação máxima (label via ::before) */
            td:nth-of-type(2) { font-size: 12px; color: var(--text-muted); margin-bottom: 15px; padding: 0; }
            td:nth-of-type(2)::before { content: "Pontuação Máxima da Técnica: "; }

            /* Colunas 3–6: Notas de cada aluno (layout flex label + input) */
            td:nth-of-type(3), td:nth-of-type(4), td:nth-of-type(5), td:nth-of-type(6) { display: flex; justify-content: space-between; align-items: center; padding: 8px 0; border-bottom: none; }
            td:nth-of-type(3)::before { content: "Nota - Aluno 1:"; font-size: 13px; font-weight: 600; }
            td:nth-of-type(4)::before { content: "Nota - Aluno 2:"; font-size: 13px; font-weight: 600; }
            td:nth-of-type(5)::before { content: "Nota - Aluno 3:"; font-size: 13px; font-weight: 600; }
            td:nth-of-type(6)::before { content: "Nota - Aluno 4:"; font-size: 13px; font-weight: 600; }

            /* Aumenta o input no mobile para facilitar digitação por toque */
            .nota-input { width: 100px; padding: 8px; font-size: 14px; text-align: right; }
        }
    </style>
</head>

    // ============================================================

        document.getElementById('aluno-1'),

    // ============================================================
    // FUNÇÃO: carregarAlunosBase()
    //
    // Busca todos os alunos ATIVOS do Supabase e popula os 4 selects.
    //
    // QUERY:
    //   - Tabela principal: alunos (id, nome)
    //   - JOIN implícito:   progresso_tecnico (faixa_atual)
    //     A coluna de graduação atual NÃO fica em 'alunos' diretamente.
    //     Ela vive na tabela relacionada 'progresso_tecnico'.
    //
    // NORMALIZAÇÃO:
    //   Os dados do banco são transformados em um array plano:
    //   { id, nome, faixa_atual } — extrai faixa_atual do sub-array.
    //   Fallback: 'Branca' se o aluno não tiver progresso registrado.
    // ============================================================
    async function carregarAlunosBase() {
        const { data, error } = await _supabase
            .from('alunos')
            .select('id, nome, progresso_tecnico (faixa_atual)')
            .eq('status', 'ativo')            // Apenas alunos com matrícula ativa
            .order('nome', { ascending: true }); // Ordem alfabética

        if (error) {
            console.error("Erro Supabase ao listar alunos:", error.message);
            seletores[0].innerHTML = '<option value="">Erro ao carregar</option>';
            return;
        }

        // Normaliza: achata o sub-array do JOIN em uma propriedade simples
        cacheAlunos = data.map(al => ({
            id:          al.id,
            nome:        al.nome,
            faixa_atual: (al.progresso_tecnico && al.progresso_tecnico[0])
                ? al.progresso_tecnico[0].faixa_atual
                : 'Branca' // Valor padrão se não houver registro de progresso
        }));

        // Popula todos os 4 selects com as mesmas options
        seletores.forEach((select) => {
            select.innerHTML = '<option value="">-- Vazio --</option>';
            cacheAlunos.forEach((al) => {
                const opt = document.createElement('option');
                opt.value       = al.id.toString();
                opt.textContent = al.nome;
                select.appendChild(opt);
            });
        });
    }

    // ============================================================
    // EVENTO: Candidato 1 selecionado → DISPARA TUDO
    //
    // O Candidato 1 é o "gatilho" da sessão de exame:
    //   1. Atualiza o badge com a graduação do candidato
    //   2. Exibe o primeiro nome no cabeçalho da tabela
    //   3. Desbloqueia os selects dos candidatos 2, 3 e 4
    //   4. Renderiza a matriz técnica baseada na faixa_atual do aluno 1
    // ============================================================
    seletores[0].addEventListener('change', (e) => {
        const valorSelecionado = e.target.value.toString();
        const al1 = cacheAlunos.find(a => a.id.toString() === valorSelecionado);

        if (!al1) return; // Selecionou "-- Vazio --" ou valor inválido

        // Exibe faixa e nome no cabeçalho
        document.getElementById('badge-1').textContent    = al1.faixa_atual;
        document.getElementById('col-aluno-1').textContent = al1.nome.split(' ')[0];

        // Habilita os selects de candidatos adicionais
        for (let i = 1; i < 4; i++) {
            seletores[i].disabled = false;
        }

        // Gera a tabela de técnicas para a graduação selecionada
        renderizarMatriz(al1.faixa_atual);
    });

    // ============================================================
    // EVENTOS: Candidatos 2, 3 e 4
    //
    // Apenas atualizam o badge e o cabeçalho da coluna correspondente.
    // Não re-renderizam a matriz (que é definida pelo candidato 1).
    //
    // Nota: usa closure do loop (let i) — "i" é capturado corretamente.
    // ============================================================
    for (let i = 1; i < 4; i++) {
        seletores[i].addEventListener('change', (e) => {
            const valorSecundario = e.target.value.toString();
            const al  = cacheAlunos.find(a => a.id.toString() === valorSecundario);
            const lbl = document.getElementById(`col-aluno-${i + 1}`);
            const bdg = document.getElementById(`badge-${i + 1}`);

            if (al) {
                lbl.textContent = al.nome.split(' ')[0]; // Apenas o primeiro nome no header
                bdg.textContent = al.faixa_atual;
            } else {
                // Candidato desmarcado (voltou para "-- Vazio --")
                lbl.textContent = `Aluno ${i + 1}`;
                bdg.textContent = "-";
            }
        });
    }

    // ============================================================
    // FUNÇÃO: renderizarMatriz(faixa)
    //
    // Recebe a graduação do Candidato 1 e gera dinamicamente as
    // linhas da tabela com base no REGRAS_EXAME correspondente.
    //
    // NORMALIZAÇÃO ANTI-ESPAÇO:
    //   .trim().toLowerCase() antes de consultar o objeto REGRAS_EXAME
    //   evita que espaços invisíveis vindos do banco (ex: "Branca ")
    //   causem falha de mapeamento.
    //
    // Cada linha gerada contém:
    //   - Categoria + nome da técnica
    //   - Pontuação máxima
    //   - 4 inputs de nota (n-al1 a n-al4) com data-index para controle
    // ============================================================
    function renderizarMatriz(faixa) {
        if (!faixa) {
            alert("Erro: Aluno sem graduação definida.");
            return;
        }

        // Normaliza a faixa: remove espaços e coloca tudo em minúsculo
        // para garantir match com as chaves do REGRAS_EXAME
        const faixaChave = faixa.trim().toLowerCase();
        const items      = REGRAS_EXAME[faixaChave];

        if (!items) {
            // Graduação existe no banco mas não tem ementa cadastrada no sistema
            alert(`Erro de Mapeamento: A graduação "${faixa.trim()}" vinda do banco não corresponde a nenhuma ementa técnica.`);
            return;
        }

        const corpo = document.getElementById('tabela-corpo-itens');
        corpo.innerHTML = ""; // Limpa iterações anteriores

        // Atualiza o título da seção com a graduação em maiúsculo
        document.getElementById('titulo-tabela-exame').textContent =
            `Matriz de Avaliação — Nível Faixa ${faixa.trim().toUpperCase()}`;

        // Gera uma linha <tr> para cada técnica da ementa
        items.forEach((item, index) => {
            const tr = document.createElement('tr');
            tr.innerHTML = `
                <td><strong>[${item.cat}]</strong> ${item.nome}</td>
                <td><strong>${item.max}</strong></td>
                <!-- Inputs das notas: classes n-al1..n-al4 usadas na coleta do submit -->
                <td><input type="number" step="0.1" min="0" max="${item.max}" class="nota-input n-al1" data-index="${index}" required></td>
                <td><input type="number" step="0.1" min="0" max="${item.max}" class="nota-input n-al2" data-index="${index}"></td>
                <td><input type="number" step="0.1" min="0" max="${item.max}" class="nota-input n-al3" data-index="${index}"></td>
                <td><input type="number" step="0.1" min="0" max="${item.max}" class="nota-input n-al4" data-index="${index}"></td>
            `;
            corpo.appendChild(tr);
        });

        // Exibe o card de notas (estava oculto por padrão)
        document.getElementById('card-notas-dinamicas').style.display = 'block';
    }

    // ============================================================
    // EVENTO: Submit do formulário — GRAVAÇÃO EM LOTE NO SUPABASE
    //
    // Percorre os 4 candidatos, soma todas as notas de cada um e
    // monta um array de objetos para INSERT em lote na tabela
    // 'exames_notas'. Candidatos sem seleção (value="") são ignorados.
    //
    // DADOS GRAVADOS POR ALUNO:
    //   - conta_avaliador:       identificador da banca (do localStorage)
    //   - nome_real_avaliador:   nome do avaliador (do localStorage)
    //   - graduacao_avaliador:   graduação do avaliador (do localStorage)
    //   - id_aluno:              UUID do candidato
    //   - faixa_avaliada:        graduação do candidato no momento do exame
    //   - materia:               rótulo fixo "Exame de Graduação em Lote"
    //   - nota:                  somatório bruto de todos os inputs do aluno
    // ============================================================
    document.getElementById('form-banca-notas').addEventListener('submit', async (e) => {
        e.preventDefault();
        const inserts = [];

        for (let i = 0; i < 4; i++) {
            const idAluno = seletores[i].value;
            if (!idAluno) continue; // Slot vazio — pula sem erro

            // Recupera o objeto completo do aluno do cache local
            const alObj = cacheAlunos.find(a => a.id.toString() === idAluno.toString());

            // Seleciona todos os inputs de nota do aluno i+1
            const inputsNota = document.querySelectorAll(`.n-al${i + 1}`);
            let somatorioBruto = 0;

            // Soma todas as notas digitadas (parseFloat || 0 para campos vazios)
            inputsNota.forEach(input => {
                somatorioBruto += parseFloat(input.value) || 0;
            });

            inserts.push({
                conta_avaliador:      contaBanca,
                nome_real_avaliador:  nomeAvaliador,
                graduacao_avaliador:  graduacaoAvaliador,
                id_aluno:             idAluno,
                faixa_avaliada:       alObj ? alObj.faixa_atual : 'Desconhecida',
                materia:              "Exame de Graduação em Lote",
                nota:                 somatorioBruto
            });
        }

        // INSERT em lote: envia todos os registros de uma só vez
        const { data, error } = await _supabase.from('exames_notas').insert(inserts);

        if (error) {
            alert(`Erro na gravação das notas: ${error.message}`);
        } else {
            alert(`Sucesso! Notas da banca gravadas com êxito no Supabase.`);
            location.reload(); // Reseta a sessão para nova rodada
        }
    });

    // ============================================================
    // INICIALIZAÇÃO: carrega os alunos ao abrir a página
    // ============================================================
    window.onload = carregarAlunosBase;
</script>
</body>
