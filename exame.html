<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <style>
        /* ======================================================
           DESIGN SYSTEM
        ====================================================== */
        :root {
            --primary:     #ff1a1a;
            --accent:      #ff9f0a;
            --dark-bg:     #0a0a0a;
            --card-bg:     #141414;
            --card-border: #262626;
            --input-bg:    #0d0d0d;
            --text-main:   #ffffff;
            --text-muted:  #a0a0a0;
            --success:     #30d158;
            --error:       #ff453a;
        }

        *, *::before, *::after { box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif;
            background: var(--dark-bg);
            color: var(--text-main);
            margin: 0; padding: 0;
            -webkit-font-smoothing: antialiased;
        }

        /* ======================================================
           HEADER — Mobile-First
        ====================================================== */
        header {
            background: rgba(0,0,0,0.9);
            backdrop-filter: blur(10px);
            position: sticky;
            top: 0;
            z-index: 100;
            padding: 16px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--card-border);
            gap: 12px;
        }

        .header-brand { font-size: 16px; font-weight: 800; letter-spacing: 1px; white-space: nowrap; }
        .header-brand span { color: var(--primary); }

        /* Badge do avaliador logado */
        .banca-info {
            color: var(--accent);
            font-weight: 700;
            font-size: 12px;
            background: #1c1c1e;
            padding: 6px 12px;
            border-radius: 20px;
            border: 1px solid #3a3a3c;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 200px;
        }

        /* ======================================================
           GLOBAL NAVIGATION (MOBILE BOTTOM BAR -> DESKTOP HEADER)
        ====================================================== */
        .global-nav {
            position: fixed;
            bottom: 0; left: 0; width: 100%;
            background: rgba(28, 28, 30, 0.95);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border-top: 1px solid var(--border);
            display: flex;
            justify-content: space-around;
            padding: 10px 0;
            z-index: 1000;
            padding-bottom: calc(10px + env(safe-area-inset-bottom));
        }

        .global-nav .nav-item {
            color: var(--text-muted);
            text-decoration: none;
            font-size: 11px;
            font-weight: 700;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            transition: color 0.2s;
            text-transform: uppercase;
        }

        .global-nav .nav-item:hover,
        .global-nav .nav-item.ativa {
            color: var(--primary);
        }

        .global-nav .nav-item span { font-size: 20px; }

        body { padding-bottom: 80px; } /* Espaço para a barra no mobile */

        @media (min-width: 768px) {
            .global-nav {
                position: static;
                width: auto;
                background: none;
                border: none;
                padding: 0;
                margin-left: 30px;
                margin-right: auto;
                justify-content: flex-start;
                gap: 30px;
            }
            .global-nav .nav-item {
                flex-direction: row;
                font-size: 13px;
            }
            .global-nav .nav-item span { font-size: 16px; }
            body { padding-bottom: 0; }
        }

        /* ======================================================
           LAYOUT PRINCIPAL
        ====================================================== */
        .main-container {
            max-width: 1300px;
            margin: 24px auto;
            padding: 0 16px;
        }

        /* ======================================================
           CARD GENÉRICO
        ====================================================== */
        .card {
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 4px 30px rgba(0,0,0,0.5);
        }

        .card h3 {
            margin: 0 0 8px 0;
            font-size: 16px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .card p {
            color: var(--text-muted);
            font-size: 13px;
            margin: 0 0 16px 0;
            line-height: 1.5;
        }

        /* ======================================================
           GRADE DE SELETORES — Mobile-First (1 coluna → 4 colunas)
        ====================================================== */
        .selectors-grid {
            display: grid;
            grid-template-columns: 1fr;  /* Mobile: 1 coluna */
            gap: 12px;
        }

        @media (min-width: 600px) {
            .selectors-grid { grid-template-columns: repeat(2, 1fr); }
        }

        @media (min-width: 900px) {
            .selectors-grid { grid-template-columns: repeat(4, 1fr); }
        }

        .form-group label {
            display: block;
            font-size: 11px;
            font-weight: 700;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 6px;
        }

        /* Select padrão */
        .form-control {
            width: 100%;
            background: var(--input-bg);
            border: 1px solid var(--card-border);
            border-radius: 8px;
            padding: 10px 12px;
            color: var(--text-main);
            font-size: 14px;
            -webkit-appearance: none;
            appearance: none;
            transition: border-color 0.2s;
        }

        .form-control:focus {
            outline: none;
            border-color: var(--accent);
        }

        .form-control:disabled { opacity: 0.4; cursor: not-allowed; }

        /* Badge de faixa abaixo do select */
        .faixa-badge {
            display: inline-block;
            margin-top: 6px;
            padding: 4px 10px;
            border-radius: 4px;
            font-size: 11px;
            font-weight: 700;
            background: #2c2c2e;
            color: #fff;
            border: 1px solid #3a3a3c;
        }

        /* ======================================================
           TABELA DE AVALIAÇÃO — Desktop
        ====================================================== */
        table { width: 100%; border-collapse: collapse; margin-top: 16px; }
        th, td { padding: 10px 12px; text-align: left; border-bottom: 1px solid var(--card-border); }
        th { background: #1c1c1e; font-size: 11px; text-transform: uppercase; color: var(--text-muted); font-weight: 600; }

        /* Input de nota individual */
        .nota-input {
            width: 72px;
            text-align: center;
            background: #000;
            border: 1px solid #3a3a3c;
            color: #fff;
            padding: 6px 4px;
            border-radius: 4px;
            font-size: 14px;
            transition: border-color 0.2s;
        }

        /* Estado de erro na validação da nota */
        .nota-input.invalida {
            border-color: var(--error) !important;
            background: rgba(255, 69, 58, 0.1) !important;
        }

        /* Botão de submit do formulário */
        .btn-submit {
            width: 100%;
            padding: 15px;
            background: var(--primary);
            color: #fff;
            border: none;
            border-radius: 8px;
            font-size: 15px;
            font-weight: 800;
            text-transform: uppercase;
            cursor: pointer;
            margin-top: 20px;
            transition: background 0.2s, transform 0.1s;
        }

        .btn-submit:hover { background: #cc0000; }
        .btn-submit:active { transform: scale(0.99); }
        .btn-submit:disabled { background: #3a3a3c; cursor: not-allowed; }

        /* ======================================================
           TABELA MOBILE — Cards empilhados (< 768px)
           Cada <tr> vira um card vertical com labels via ::before
        ====================================================== */
        @media (max-width: 768px) {
            table, thead, tbody, th, td, tr { display: block; }

            /* Esconde o cabeçalho real — labels geradas via CSS ::before */
            thead tr { position: absolute; top: -9999px; left: -9999px; }

            /* Cada linha vira um card independente */
            tr {
                background: #1c1c1e;
                border: 1px solid var(--card-border);
                border-radius: 10px;
                margin-bottom: 12px;
                padding: 14px;
            }

            /* Coluna 1: Nome da técnica */
            td:nth-of-type(1) {
                font-size: 14px;
                color: var(--accent);
                border-bottom: 1px dashed #3a3a3c;
                padding-bottom: 10px;
                margin-bottom: 10px;
                font-weight: 700;
            }

            /* Coluna 2: Pontuação máxima */
            td:nth-of-type(2) { font-size: 12px; color: var(--text-muted); margin-bottom: 10px; padding: 0; }
            td:nth-of-type(2)::before { content: "Pontuação Máxima: "; font-weight: 600; }

            /* Colunas 3–6: Notas com label via ::before */
            td:nth-of-type(3),
            td:nth-of-type(4),
            td:nth-of-type(5),
            td:nth-of-type(6) {
                display: flex;
                justify-content: space-between;
                align-items: center;
                padding: 8px 0;
                border-bottom: none;
            }

            td:nth-of-type(3)::before { content: "Nota — " attr(data-label) ":"; font-size: 12px; font-weight: 600; color: var(--text-muted); }
            td:nth-of-type(4)::before { content: "Nota — " attr(data-label) ":"; font-size: 12px; font-weight: 600; color: var(--text-muted); }
            td:nth-of-type(5)::before { content: "Nota — " attr(data-label) ":"; font-size: 12px; font-weight: 600; color: var(--text-muted); }
            td:nth-of-type(6)::before { content: "Nota — " attr(data-label) ":"; font-size: 12px; font-weight: 600; color: var(--text-muted); }

            /* Input maior no mobile para facilitar toque */
            .nota-input { width: 90px; padding: 8px; font-size: 15px; text-align: right; }

            .main-container { padding: 0 12px; margin: 16px auto; }
            .card { padding: 16px; }
        }

        /* ======================================================
           SISTEMA DE MÚLTIPLAS RODADAS
        ====================================================== */

        /* Container que envolve TODAS as rodadas extras */
        #rodadas-extras {
            max-width: 1300px;
            margin: 0 auto;
            padding: 0 16px;
        }

        /* Header de identificação de cada rodada extra */
        .rodada-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
            padding-bottom: 12px;
            border-bottom: 2px solid var(--primary);
        }

        .rodada-titulo {
            font-size: 14px;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--primary);
        }

        /* Botão de remover a rodada (X) */
        .btn-remover-rodada {
            background: none;
            border: 1px solid #3a3a3c;
            color: var(--text-muted);
            border-radius: 6px;
            padding: 4px 10px;
            font-size: 12px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .btn-remover-rodada:hover { border-color: var(--danger); color: var(--danger); }

        /* Botão principal: + Nova Rodada */
        .btn-nova-rodada {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            width: calc(100% - 32px);
            max-width: 1300px;
            margin: 0 auto 32px auto;
            padding: 14px;
            background: transparent;
            border: 2px dashed #3a3a3c;
            border-radius: 12px;
            color: var(--text-muted);
            font-size: 14px;
            font-weight: 700;
            text-transform: uppercase;
            cursor: pointer;
            transition: all 0.25s;
        }
        .btn-nova-rodada:hover {
            border-color: var(--primary);
            color: var(--primary);
            background: rgba(255,26,26,0.04);
        }

        /* Animação de entrada de cada nova rodada */
        @keyframes slideDown {
            from { opacity: 0; transform: translateY(-10px); }
            to   { opacity: 1; transform: translateY(0); }
        }
        .rodada-bloco { animation: slideDown 0.25s ease; }

        @media (max-width: 768px) {
            .btn-nova-rodada { width: calc(100% - 24px); padding: 12px; }
            #rodadas-extras { padding: 0 12px; }
        }
    </style>
</head>

    // ============================================================
    // 4. ESTADO DA SESSÃO DE EXAME
    // cacheAlunos: array normalizado { id, nome, faixa_atual }
    // ============================================================
    let cacheAlunos = [];
    let totalRodadas = 1; // Contador incremental de rodadas extras (rodada 1 é a original)
    const seletores = [
        document.getElementById('aluno-1'),
        document.getElementById('aluno-2'),
        document.getElementById('aluno-3'),
        document.getElementById('aluno-4')

    // ============================================================
    // 5. carregarAlunosBase()
    //
    // Query com JOIN em progresso_tecnico para obter faixa_atual.
    // A faixa NÃO existe diretamente em 'alunos' — vive na tabela
    // relacionada 'progresso_tecnico' (campo faixa_atual).
    // ============================================================
    async function carregarAlunosBase() {
        const { data, error } = await _supabase
            .from('alunos')
            .select('id, nome, progresso_tecnico (faixa_atual)')
            .eq('status', 'ativo')
            .order('nome', { ascending: true });

        if (error) {
            console.error("Erro ao listar alunos:", error.message);
            seletores[0].innerHTML = '<option value="">Erro ao carregar alunos</option>';
            return;
        }

        // Normaliza: extrai faixa_atual do sub-array do JOIN
        cacheAlunos = data.map(al => ({
            id:          al.id,
            nome:        al.nome,
            faixa_atual: (al.progresso_tecnico && al.progresso_tecnico[0])
                ? al.progresso_tecnico[0].faixa_atual
                : 'Branca' // fallback se não houver registro de progresso
        }));

        // Popula SOMENTE o select do Candidato 1 com todos os alunos ativos.
        // Os selects 2-4 são preenchidos dinamicamente pelo filtro de faixa
        // após a seleção do Candidato 1 (ver evento change do seletor[0] abaixo).
        seletores[0].innerHTML = '<option value="">Selecione o Candidato 1...</option>';
        cacheAlunos.forEach(al => {
            const opt = document.createElement('option');
            opt.value       = al.id;
            opt.textContent = `${al.nome} — ${al.faixa_atual}`;
            seletores[0].appendChild(opt);
        });

        restaurarEstadoLocalStorage();
    }

    seletores[0].addEventListener('change', (e) => {
        const id  = e.target.value;
        const al1 = cacheAlunos.find(a => a.id === id);

        if (!al1) {
            for (let i = 1; i < 4; i++) {
                seletores[i].innerHTML  = '<option value="">— Selecione o Candidato 1 primeiro —</option>';
                seletores[i].disabled   = true;
                document.getElementById(`badge-${i + 1}`).textContent = '—';
                document.getElementById(`col-aluno-${i + 1}`).textContent = `Candidato ${i + 1}`;
            }
            document.getElementById('card-notas-dinamicas').style.display = 'none';
            document.getElementById('badge-1').textContent = '—';
            atualizarTodosSeletores();
            salvarEstadoLocalStorage();
            return;
        }

        document.getElementById('badge-1').textContent        = al1.faixa_atual;
        document.getElementById('col-aluno-1').textContent    = al1.nome.split(' ')[0];

        atualizarTodosSeletores();
        renderizarMatriz(al1.faixa_atual);
        salvarEstadoLocalStorage();
    });

    for (let i = 1; i < 4; i++) {
        seletores[i].addEventListener('change', (e) => {
            const al  = cacheAlunos.find(a => a.id === e.target.value);
            const lbl = document.getElementById(`col-aluno-${i + 1}`);
            const bdg = document.getElementById(`badge-${i + 1}`);

            if (al) {
                lbl.textContent = al.nome.split(' ')[0];

            } else {
                lbl.textContent = `Candidato ${i + 1}`;
                bdg.textContent = '—';
            }
            atualizarTodosSeletores();
            salvarEstadoLocalStorage();
        });
    }

    // ============================================================
    // 8. renderizarMatriz(faixa)
    //
    // .trim().toLowerCase() antes de consultar REGRAS_EXAME para
    // tolerar espaços invisíveis e capitalização variável do banco.
    // ============================================================
    function renderizarMatriz(faixa) {
        if (!faixa) {
            exibirToast('Aluno sem graduação definida.', 'erro');
            return;
        }

        const faixaChave = faixa.trim().toLowerCase();
        const items      = REGRAS_EXAME[faixaChave];

        if (!items) {
            exibirToast(`Graduação "${faixa.trim()}" sem ementa cadastrada.`, 'erro');
            return;
        }

        const corpo = document.getElementById('tabela-corpo-itens');
        corpo.innerHTML = '';

        // Título em maiúsculo sem interpolação de HTML (textContent)
        document.getElementById('titulo-tabela-exame').textContent =
            `Matriz de Avaliação — Faixa ${faixa.trim().toUpperCase()}`;

        items.forEach((item, index) => {
            const tr = document.createElement('tr');

            // Cria células sem innerHTML para evitar XSS em dados futuros do banco
            const tdTecnica = document.createElement('td');
            const strong = document.createElement('strong');
            strong.textContent = `[${item.cat}] `;
            tdTecnica.appendChild(strong);
            tdTecnica.appendChild(document.createTextNode(item.nome));

            const tdMax = document.createElement('td');
            tdMax.innerHTML = `<strong>${item.max}</strong>`;

            // Cria os 4 inputs de nota
            const inputClasses = ['n-al1', 'n-al2', 'n-al3', 'n-al4'];
            const inputRequireds = [true, false, false, false];

            const cells = [tdTecnica, tdMax];
            inputClasses.forEach((cls, ci) => {
                const td    = document.createElement('td');
                const input = document.createElement('input');
                input.type         = 'number';
                input.step         = '0.1';
                input.min          = '0';
                input.max          = String(item.max);
                input.className    = `nota-input ${cls}`;
                input.dataset.index = String(index);
                input.dataset.max   = String(item.max);
                if (inputRequireds[ci]) input.required = true;
                td.appendChild(input);
                cells.push(td);
            });

            cells.forEach(c => tr.appendChild(c));
            corpo.appendChild(tr);
        });

        document.getElementById('card-notas-dinamicas').style.display = 'block';
    }

    // ============================================================
    // 9. SUBMIT — GRAVAÇÃO EM LOTE COM VALIDAÇÃO ESTRITA
    //
    // SEGURANÇA APLICADA:
    //   a) validarUUID(idAluno) — rejeita IDs malformados
    //   b) validarNota(valor, max) — rejeita strings, NaN, out-of-range
    //   c) Feedback visual nos inputs inválidos (.invalida)
    //   d) INSERT só ocorre se TODOS os dados passarem na validação
    // ============================================================
    document.getElementById('form-banca-notas').addEventListener('submit', async (e) => {
        e.preventDefault();

        const btnGravar = document.getElementById('btn-gravar');
        const inserts   = [];
        let   temErro   = false;

        // Limpa marcações de erro anteriores
        document.querySelectorAll('.nota-input.invalida').forEach(el => el.classList.remove('invalida'));

        for (let i = 0; i < 4; i++) {
            const idAluno = seletores[i].value;
            if (!idAluno) continue; // Slot vazio — OK, pula

            // VALIDAÇÃO 1: ID deve ser UUID v4 válido
            if (!validarUUID(idAluno)) {
                exibirToast(`ID do Candidato ${i + 1} é inválido. Recarregue a página.`, 'erro');
                temErro = true;
                break;
            }

            const alObj      = cacheAlunos.find(a => a.id === idAluno);
            const inputsNota = document.querySelectorAll(`.n-al${i + 1}`);
            let   somatório  = 0;
            let   erroNota   = false;

            inputsNota.forEach(input => {
                const maxItem = parseFloat(input.dataset.max);
                const nota    = validarNota(input.value, maxItem);

                if (nota === null) {
                    // VALIDAÇÃO 2: nota inválida — marca o input visualmente
                    input.classList.add('invalida');
                    erroNota = true;
                } else {
                    somatório += nota;
                }
            });

            if (erroNota) {
                exibirToast(
                    `Notas do Candidato ${i + 1} inválidas. Verifique os campos marcados em vermelho.`,
                    'erro',
                    5000
                );
                temErro = true;
                break;
            }

            inserts.push({
                conta_avaliador:     contaBanca,
                nome_real_avaliador: nomeAvaliador,
                graduacao_avaliador: graduacaoAvaliador,
                id_aluno:            idAluno,
                faixa_avaliada:      alObj ? alObj.faixa_atual : 'Desconhecida',
                materia:             'Exame de Graduação em Lote',
                nota:                somatório
            });
        }

        if (temErro || inserts.length === 0) {
            if (inserts.length === 0 && !temErro) {
                exibirToast('Selecione pelo menos 1 candidato.', 'aviso');
            }
            return;
        }

        // Desabilita o botão durante o INSERT para evitar duplo clique
        btnGravar.disabled     = true;
        btnGravar.textContent  = 'Gravando...';

        const { error } = await _supabase.from('exames_notas').insert(inserts);

        if (error) {
            exibirToast(`Erro na gravação: ${error.message}`, 'erro', 6000);
            btnGravar.disabled    = false;
            btnGravar.textContent = 'Gravar Notas de Toda a Banca';
        } else {
            exibirToast('Todas as notas foram gravadas com sucesso! ✅', 'sucesso', 5000);

            // Feedback visual no botão original
            btnGravar.textContent = '✅ Tudo Gravado';
            btnGravar.style.background = '#1c421c';
            btnGravar.style.color      = '#30d158';

            // Cria botão de impressão
            const btnImprimir = document.createElement('button');
            btnImprimir.innerHTML = '🖨️ Imprimir Certificados';
            btnImprimir.className = 'btn-acao';
            btnImprimir.style.background = '#0a84ff';
            btnImprimir.style.marginLeft = '10px';
            btnImprimir.onclick = () => {
                const idsParam = inserts.map(i => i.id_aluno).join(',');
                window.open(`certificado.html?ids=${idsParam}`, '_blank');
            };
            btnGravar.insertAdjacentElement('afterend', btnImprimir);

            // Desabilita tudo
            document.querySelectorAll('.nota-input').forEach(i => i.disabled = true);
            localStorage.removeItem('wtkd_sessao_exame');
        }
    });

    // ============================================================
    // 9.1. FUNÇÕES AUXILIARES DE EXCLUSÃO MÚTUA E PERSISTÊNCIA
    // ============================================================

    /**
     * Evita que o mesmo aluno seja selecionado em mais de um select na página.
     * reconstrói as opções dos selects filtrando os alunos já selecionados
     * em outras rodadas ou posições.
     */
    function atualizarTodosSeletores() {
        const todosSelects = Array.from(document.querySelectorAll('select[id*="aluno-"]'));
        const selecionados = todosSelects.map(s => s.value).filter(v => v !== "");

        const rodadas = [1];
        for (let n = 2; n <= totalRodadas; n++) {
            if (document.getElementById(`rodada-bloco-${n}`)) {
                rodadas.push(n);
            }
        }

        rodadas.forEach(r => {
            const prefix = r === 1 ? "" : `r${r}-`;
            const sel1 = document.getElementById(`${prefix}aluno-1`);
            if (!sel1) return;

            const valAtual1 = sel1.value;
            const al1 = cacheAlunos.find(a => a.id === valAtual1);

            // Atualiza Candidato 1
            sel1.innerHTML = '<option value="">Selecione o Candidato 1...</option>';
            cacheAlunos.forEach(al => {
                if (al.id === valAtual1 || !selecionados.includes(al.id)) {
                    const opt = document.createElement('option');
                    opt.value = al.id;
                    opt.textContent = `${al.nome} — ${al.faixa_atual}`;
                    sel1.appendChild(opt);
                }
            });
            sel1.value = valAtual1;

            // Atualiza Candidatos 2, 3, 4
            const faixaFiltro = al1 ? al1.faixa_atual.trim().toLowerCase() : null;

            for (let i = 2; i <= 4; i++) {
                const selI = document.getElementById(`${prefix}aluno-${i}`);
                if (!selI) continue;

                const valAtualI = selI.value;
                const colId = r === 1 ? `col-aluno-${i}` : `${prefix}col-${i}`;
                const badgeId = `${prefix}badge-${i}`;
                const colElem = document.getElementById(colId);
                const badgeElem = document.getElementById(badgeId);

                if (!al1) {
                    selI.innerHTML = '<option value="">— Selecione o Candidato 1 primeiro —</option>';
                    selI.disabled = true;
                    selI.value = "";
                    if (badgeElem) badgeElem.textContent = '—';
                    if (colElem) colElem.textContent = `Candidato ${i}`;
                    continue;
                }

                // Filtra alunos da mesma faixa que não estejam selecionados em outro lugar
                const mesmaFaixaFiltrada = cacheAlunos.filter(al => {
                    const mesmaFaixa = al.faixa_atual.trim().toLowerCase() === faixaFiltro;
                    const naoSelecionadoOutro = al.id === valAtualI || !selecionados.includes(al.id);
                    return mesmaFaixa && naoSelecionadoOutro;
                });

                if (mesmaFaixaFiltrada.length === 0 && valAtualI === "") {
                    selI.innerHTML = `<option value="">— Sem outros alunos em ${al1.faixa_atual} —</option>`;
                    selI.disabled = true;
                    selI.value = "";
                    if (badgeElem) badgeElem.textContent = '—';
                    if (colElem) colElem.textContent = `Candidato ${i}`;
                } else {
                    selI.innerHTML = '<option value="">— Vazio (opcional) —</option>';
                    mesmaFaixaFiltrada.forEach(al => {
                        const opt = document.createElement('option');
                        opt.value = al.id;
                        opt.textContent = al.nome;
                        selI.appendChild(opt);
                    });
                    selI.disabled = false;
                    selI.value = valAtualI;

                    const alI = cacheAlunos.find(a => a.id === valAtualI);
                    if (alI) {
                        if (colElem) colElem.textContent = alI.nome.split(' ')[0];
                        if (badgeElem) badgeElem.textContent = alI.faixa_atual;
                    } else {
                        if (colElem) colElem.textContent = `Candidato ${i}`;
                        if (badgeElem) badgeElem.textContent = '—';
                    }
                }
            }
        });

        // Atualiza os data-labels (para a visualização mobile exibir os nomes corretos)
        rodadas.forEach(r => {
            const prefix = r === 1 ? "" : `r${r}-`;
            for (let i = 1; i <= 4; i++) {
                const colId = r === 1 ? `col-aluno-${i}` : `${prefix}col-${i}`;
                const colElem = document.getElementById(colId);
                const nome = colElem ? colElem.textContent : `Candidato ${i}`;
                const inputClass = r === 1 ? `.n-al${i}` : `.r${r}-al${i}`;
                
                document.querySelectorAll(inputClass).forEach(input => {
                    if (input.parentElement) {
                        input.parentElement.setAttribute('data-label', nome);
                    }
                });
            }
        });
    }

    /**
     * Salva o estado atual de toda a banca de avaliação no localStorage.
     */
    function salvarEstadoLocalStorage() {
        try {
            const rodadasExistentes = [1];
            for (let n = 2; n <= totalRodadas; n++) {
                if (document.getElementById(`rodada-bloco-${n}`)) {
                    rodadasExistentes.push(n);
                }
            }

            const dadosRodadas = rodadasExistentes.map(r => {
                const prefix = r === 1 ? "" : `r${r}-`;
                const candidatos = [
                    document.getElementById(`${prefix}aluno-1`) ? document.getElementById(`${prefix}aluno-1`).value : "",
                    document.getElementById(`${prefix}aluno-2`) ? document.getElementById(`${prefix}aluno-2`).value : "",
                    document.getElementById(`${prefix}aluno-3`) ? document.getElementById(`${prefix}aluno-3`).value : "",
                    document.getElementById(`${prefix}aluno-4`) ? document.getElementById(`${prefix}aluno-4`).value : ""
                ];

                const notas = [[], [], [], []];
                for (let c = 1; c <= 4; c++) {
                    const inputClass = r === 1 ? `n-al${c}` : `r${r}-al${c}`;
                    const inputs = document.querySelectorAll(`.${inputClass}`);
                    inputs.forEach(input => {
                        const idx = parseInt(input.dataset.index);
                        notas[c - 1][idx] = input.value || "";
                    });
                }

                // Salva se o botão gravar já está em estado final gravado
                const btn = r === 1 ? document.getElementById('btn-gravar') : document.getElementById(`r${r}-btn-gravar`);
                const gravado = btn ? (btn.textContent.includes('Gravado') || (btn.disabled && btn.style.background.includes('rgb(28, 66, 28)'))) : false;

                return {
                    numero: r,
                    candidatos: candidatos,
                    notas: notas,
                    gravado: gravado
                };
            });

            localStorage.setItem('wtkd_sessao_exame', JSON.stringify({
                totalRodadas: totalRodadas,
                rodadas: dadosRodadas
            }));
        } catch (e) {
            console.error("Erro ao salvar estado no localStorage:", e);
        }
    }

    /**
     * Restaura o estado anterior de toda a banca a partir do localStorage.
     */
    function restaurarEstadoLocalStorage() {
        try {
            const estadoRaw = localStorage.getItem('wtkd_sessao_exame');
            if (!estadoRaw) return;

            const estado = JSON.parse(estadoRaw);
            if (!estado || !estado.rodadas || !Array.isArray(estado.rodadas)) return;

            // 1. Recria as rodadas extras salvas
            const extraRounds = estado.rodadas.filter(r => r.numero > 1).sort((a, b) => a.numero - b.numero);
            extraRounds.forEach(rData => {
                criarEstruturaRodada(rData.numero);
                if (rData.numero > totalRodadas) {
                    totalRodadas = rData.numero;
                }
            });

            // 2. Popula os seletores de cada rodada
            estado.rodadas.forEach(rData => {
                const prefix = rData.numero === 1 ? "" : `r${rData.numero}-`;

                // Restaura Candidato 1
                const sel1 = document.getElementById(`${prefix}aluno-1`);
                if (sel1) {
                    sel1.value = rData.candidatos[0] || "";
                    const al1 = cacheAlunos.find(a => a.id === sel1.value);
                    if (al1) {
                        document.getElementById(`${prefix}badge-1`).textContent = al1.faixa_atual;
                        const col1 = document.getElementById(rData.numero === 1 ? 'col-aluno-1' : `${prefix}col-1`);
                        if (col1) col1.textContent = al1.nome.split(' ')[0];

                        // Renderiza a tabela correspondente
                        if (rData.numero === 1) {
                            renderizarMatriz(al1.faixa_atual);
                        } else {
                            renderizarMatrizRodada(rData.numero, al1.faixa_atual);
                        }
                    }
                }

                // Restaura Candidatos 2, 3, 4
                for (let i = 2; i <= 4; i++) {
                    const selI = document.getElementById(`${prefix}aluno-${i}`);
                    if (selI) {
                        selI.value = rData.candidatos[i - 1] || "";
                        const alI = cacheAlunos.find(a => a.id === selI.value);
                        const colI = document.getElementById(rData.numero === 1 ? `col-aluno-${i}` : `${prefix}col-${i}`);
                        const badgeI = document.getElementById(`${prefix}badge-${i}`);
                        if (alI) {
                            if (colI) colI.textContent = alI.nome.split(' ')[0];
                            if (badgeI) badgeI.textContent = alI.faixa_atual;
                        } else {
                            if (colI) colI.textContent = `Candidato ${i}`;
                            if (badgeI) badgeI.textContent = '—';
                        }
                    }
                }
            });

            // 3. Executa a exclusão mútua inicial de opções
            atualizarTodosSeletores();

            // 4. Preenche as notas salvas
            estado.rodadas.forEach(rData => {
                const prefix = rData.numero === 1 ? "" : `r${rData.numero}-`;

                for (let c = 1; c <= 4; c++) {
                    const inputClass = rData.numero === 1 ? `n-al${c}` : `r${rData.numero}-al${c}`;
                    const inputs = document.querySelectorAll(`.${inputClass}`);
                    const savedCandidateNotes = rData.notas[c - 1] || [];
                    inputs.forEach(input => {
                        const idx = parseInt(input.dataset.index);
                        if (savedCandidateNotes[idx] !== undefined && savedCandidateNotes[idx] !== "") {
                            input.value = savedCandidateNotes[idx];
                        }
                    });
                }

                // Se a rodada já estava salva no Supabase, bloqueia inputs e botão
                if (rData.gravado) {
                    const btn = rData.numero === 1 ? document.getElementById('btn-gravar') : document.getElementById(`r${rData.numero}-btn-gravar`);
                    if (btn) {
                        btn.textContent = '✅ Gravado';
                        btn.style.background = '#1c421c';
                        btn.style.color      = '#30d158';
                        btn.disabled = true;
                    }
                    desabilitarRodadaGravada(rData.numero);
                }
            });

        } catch (e) {
            console.error("Erro ao restaurar estado do exame:", e);
        }
    }

    /**
     * Trava seletores e notas de uma rodada gravada com sucesso.
     */
    function desabilitarRodadaGravada(n) {
        for (let i = 1; i <= 4; i++) {
            const prefix = n === 1 ? "" : `r${n}-`;
            const sel = document.getElementById(`${prefix}aluno-${i}`);
            if (sel) sel.disabled = true;

            const inputClass = n === 1 ? `n-al${i}` : `r${n}-al${i}`;
            const inputs = document.querySelectorAll(`.${inputClass}`);
            inputs.forEach(input => input.disabled = true);
        }
        if (n > 1) {
            const btnRemover = document.querySelector(`#rodada-bloco-${n} .btn-remover-rodada`);
            if (btnRemover) btnRemover.style.display = 'none';
        }
    }

    // Listener global para auto-salvar qualquer alteração de nota
    document.addEventListener('input', (e) => {
        if (e.target.classList.contains('nota-input')) {
            salvarEstadoLocalStorage();
        }
    });

    // ============================================================
    // 10. INICIALIZAÇÃO
    // ============================================================
    window.onload = carregarAlunosBase;
</script>

<!-- ============================================================
     BLOCO JS DAS RODADAS EXTRAS
============================================================ -->
<script>
    /**
     * Cria e injeta a estrutura HTML de uma rodada extra.
     */
    function criarEstruturaRodada(n) {
        const wrapper = document.createElement('div');
        wrapper.className = 'rodada-bloco';
        wrapper.id        = `rodada-bloco-${n}`;

        wrapper.innerHTML = `
            <div id="rodada-bloco-interno-${n}">
            <!-- CARD DE CONFIGURAÇÃO DA RODADA -->
            <div class="main-container" style="margin-top: 0;">
                <div class="card">
                    <div class="rodada-header">
                        <span class="rodada-titulo">🥋 Rodada ${n}</span>
                        <button class="btn-remover-rodada" onclick="removerRodada(${n})">✕ Remover</button>
                    </div>
                    <p style="color:var(--text-muted);font-size:13px;margin:0 0 16px 0">
                        Selecione candidatos da mesma faixa para esta rodada.
                    </p>

                    <div class="selectors-grid">
                        <div class="form-group">
                            <label>Candidato 1 (obrigatório)</label>
                            <select id="r${n}-aluno-1" class="form-control">
                                <option value="">Carregando...</option>
                            </select>
                            <div id="r${n}-badge-1" class="faixa-badge">—</div>
                        </div>
                        <div class="form-group">
                            <label>Candidato 2</label>
                            <select id="r${n}-aluno-2" class="form-control" disabled>
                                <option value="">— Selecione o Candidato 1 primeiro —</option>
                            </select>
                            <div id="r${n}-badge-2" class="faixa-badge">—</div>
                        </div>
                        <div class="form-group">
                            <label>Candidato 3</label>
                            <select id="r${n}-aluno-3" class="form-control" disabled>
                                <option value="">— Selecione o Candidato 1 primeiro —</option>
                            </select>
                            <div id="r${n}-badge-3" class="faixa-badge">—</div>
                        </div>
                        <div class="form-group">
                            <label>Candidato 4</label>
                            <select id="r${n}-aluno-4" class="form-control" disabled>
                                <option value="">— Selecione o Candidato 1 primeiro —</option>
                            </select>
                            <div id="r${n}-badge-4" class="faixa-badge">—</div>
                        </div>
                    </div>
                </div>

                <!-- CARD DA MATRIZ TÉCNICA DA RODADA -->
                <div class="card" id="r${n}-card-notas" style="display:none">
                    <h3 id="r${n}-titulo-tabela">Matriz de Avaliação</h3>
                    <form id="r${n}-form-notas" novalidate>
                        <table>
                            <thead>
                                <tr>
                                    <th>Matéria / Técnica Oficial</th>
                                    <th>Máx</th>
                                    <th id="r${n}-col-1">Candidato 1</th>
                                    <th id="r${n}-col-2">Candidato 2</th>
                                    <th id="r${n}-col-3">Candidato 3</th>
                                    <th id="r${n}-col-4">Candidato 4</th>
                                </tr>
                            </thead>
                            <tbody id="r${n}-corpo"></tbody>
                        </table>
                        <button type="submit" class="btn-submit" id="r${n}-btn-gravar">
                            Gravar Notas da Rodada ${n}
                        </button>
                    </form>
                </div>
            </div><!-- /main-container -->
            </div>
        `;

        document.getElementById('rodadas-extras').appendChild(wrapper);

        // Popula o seletor 1 com todos os alunos do cache
        const sel1 = document.getElementById(`r${n}-aluno-1`);
        sel1.innerHTML = '<option value="">Selecione o Candidato 1...</option>';
        cacheAlunos.forEach(al => {
            const opt = document.createElement('option');
            opt.value       = al.id;
            opt.textContent = `${al.nome} — ${al.faixa_atual}`;
            sel1.appendChild(opt);
        });

        // Ativa os listeners dos seletores desta rodada
        ativarSeletoresRodada(n);

        // Move o botão "+" para sempre ficar abaixo de tudo
        document.body.appendChild(document.getElementById('btn-nova-rodada'));
    }

    /**
     * Adiciona e rola até a nova rodada extra.
     */
    function adicionarRodada(deveRolar = true) {
        totalRodadas++;
        criarEstruturaRodada(totalRodadas);
        if (deveRolar) {
            const wrapper = document.getElementById(`rodada-bloco-${totalRodadas}`);
            setTimeout(() => wrapper.scrollIntoView({ behavior: 'smooth', block: 'start' }), 100);
        }
        salvarEstadoLocalStorage();
    }

    /**
     * Remove um bloco de rodada extra pelo número.
     */
    function removerRodada(n) {
        const bloco = document.getElementById(`rodada-bloco-${n}`);
        if (bloco) bloco.remove();
        atualizarTodosSeletores();
        salvarEstadoLocalStorage();
    }

    /**
     * Ativa os listeners de change nos 4 seletores de uma rodada extra.
     */
    function ativarSeletoresRodada(n) {
        const getSel = i => document.getElementById(`r${n}-aluno-${i}`);
        const getBdg = i => document.getElementById(`r${n}-badge-${i}`);
        const getCol = i => document.getElementById(`r${n}-col-${i}`);

        // Candidato 1 — define faixa e filtra os demais
        getSel(1).addEventListener('change', (e) => {
            const al1 = cacheAlunos.find(a => a.id === e.target.value);

            if (!al1) {
                for (let i = 2; i <= 4; i++) {
                    getSel(i).innerHTML = '<option value="">— Selecione o Candidato 1 primeiro —</option>';
                    getSel(i).disabled  = true;
                    getBdg(i).textContent = '—';
                    getCol(i).textContent = `Candidato ${i}`;
                }
                document.getElementById(`r${n}-card-notas`).style.display = 'none';
                getBdg(1).textContent = '—';
                atualizarTodosSeletores();
                salvarEstadoLocalStorage();
                return;
            }

            getBdg(1).textContent = al1.faixa_atual;
            getCol(1).textContent = al1.nome.split(' ')[0];

            atualizarTodosSeletores();

            renderizarMatrizRodada(n, al1.faixa_atual);
            salvarEstadoLocalStorage();
        });

        // Candidatos 2-4 — apenas atualizam badge e coluna
        for (let i = 2; i <= 4; i++) {
            getSel(i).addEventListener('change', (e) => {
                const al = cacheAlunos.find(a => a.id === e.target.value);
                if (al) {
                    getCol(i).textContent = al.nome.split(' ')[0];
                    getBdg(i).textContent = al.faixa_atual;
                } else {
                    getCol(i).textContent = `Candidato ${i}`;
                    getBdg(i).textContent = '—';
                }
                atualizarTodosSeletores();
                salvarEstadoLocalStorage();
            });
        }
    }

    /**
     * Renderiza a matriz técnica de uma rodada extra.
     */
    function renderizarMatrizRodada(n, faixa) {
        const faixaChave = faixa.trim().toLowerCase();
        const items      = REGRAS_EXAME[faixaChave];

        if (!items) {
            exibirToast(`Rodada ${n}: graduação "${faixa.trim()}" sem ementa cadastrada.`, 'erro');
            return;
        }

        const corpo = document.getElementById(`r${n}-corpo`);
        corpo.innerHTML = '';

        document.getElementById(`r${n}-titulo-tabela`).textContent =
            `Matriz de Avaliação — Faixa ${faixa.trim().toUpperCase()} (Rodada ${n})`;

        items.forEach((item, index) => {
            const tr = document.createElement('tr');

            const tdTecnica = document.createElement('td');
            const strong = document.createElement('strong');
            strong.textContent = `[${item.cat}] `;
            tdTecnica.appendChild(strong);
            tdTecnica.appendChild(document.createTextNode(item.nome));

            const tdMax = document.createElement('td');
            tdMax.innerHTML = `<strong>${item.max}</strong>`;

            const cells = [tdTecnica, tdMax];

            ['al1','al2','al3','al4'].forEach((cls, ci) => {
                const td    = document.createElement('td');
                const input = document.createElement('input');
                input.type            = 'number';
                input.step            = '0.1';
                input.min             = '0';
                input.max             = String(item.max);
                input.className       = `nota-input r${n}-${cls}`;
                input.dataset.index   = String(index);
                input.dataset.max     = String(item.max);
                td.appendChild(input);
                cells.push(td);
            });

            cells.forEach(c => tr.appendChild(c));
            corpo.appendChild(tr);
        });

        document.getElementById(`r${n}-card-notas`).style.display = 'block';

        // Ativa o submit desta rodada
        const form = document.getElementById(`r${n}-form-notas`);
        if (!form.dataset.listenerAtivo) {
            form.dataset.listenerAtivo = '1';
            form.addEventListener('submit', (e) => submitRodada(e, n));
        }
    }

    /**
     * Grava as notas de uma rodada extra.
     */
    async function submitRodada(e, n) {
        e.preventDefault();

        const btn     = document.getElementById(`r${n}-btn-gravar`);
        const inserts = [];
        let   temErro = false;

        // Limpa erros visuais anteriores
        document.querySelectorAll(`#rodada-bloco-${n} .nota-input.invalida`)
            .forEach(el => el.classList.remove('invalida'));

        for (let i = 1; i <= 4; i++) {
            const sel     = document.getElementById(`r${n}-aluno-${i}`);
            const idAluno = sel ? sel.value : '';
            if (!idAluno) continue;

            if (!validarUUID(idAluno)) {
                exibirToast(`Rodada ${n} — ID do Candidato ${i} inválido.`, 'erro');
                temErro = true;
                break;
            }

            const alObj      = cacheAlunos.find(a => a.id === idAluno);
            const inputsNota = document.querySelectorAll(`#rodada-bloco-${n} .r${n}-al${i}`);
            let   soma       = 0;
            let   erroNota   = false;

            inputsNota.forEach(input => {
                const maxItem = parseFloat(input.dataset.max);
                const nota    = validarNota(input.value, maxItem);
                if (nota === null) {
                    input.classList.add('invalida');
                    erroNota = true;
                } else {
                    soma += nota;
                }
            });

            if (erroNota) {
                exibirToast(
                    `Rodada ${n} — Notas do Candidato ${i} inválidas (campos em vermelho).`,
                    'erro', 5000
                );
                temErro = true;
                break;
            }

            inserts.push({
                conta_avaliador:     contaBanca,
                nome_real_avaliador: nomeAvaliador,
                graduacao_avaliador: graduacaoAvaliador,
                id_aluno:            idAluno,
                faixa_avaliada:      alObj ? alObj.faixa_atual : 'Desconhecida',
                materia:             `Exame de Graduação em Lote — Rodada ${n}`,
                nota:                soma
            });
        }

        if (temErro || inserts.length === 0) {
            if (!temErro) exibirToast(`Rodada ${n}: selecione pelo menos 1 candidato.`, 'aviso');
            return;
        }

        btn.disabled    = true;
        btn.textContent = 'Gravando...';

        const { error } = await _supabase.from('exames_notas').insert(inserts);

        if (error) {
            exibirToast(`Rodada ${n} — Erro: ${error.message}`, 'erro', 6000);
            btn.disabled    = false;
            btn.textContent = `Gravar Notas da Rodada ${n}`;
        } else {
            exibirToast(`Rodada ${n} gravada com sucesso! ✅`, 'sucesso');
            btn.textContent = '✅ Gravado';
            btn.style.background = '#1c421c';
            btn.style.color      = '#30d158';
            btn.disabled = true;

            // Injeta botão de certificado para a rodada
            if (!btn.nextElementSibling || !btn.nextElementSibling.innerHTML.includes('Imprimir')) {
                const btnImprimir = document.createElement('button');
                btnImprimir.innerHTML = '🖨️ Imprimir Certificados';
                btnImprimir.className = 'btn-acao';
                btnImprimir.style.background = '#0a84ff';
                btnImprimir.style.marginLeft = '10px';
                btnImprimir.onclick = () => {
                    const idsParam = inserts.map(i => i.id_aluno).join(',');
                    window.open(`certificado.html?ids=${idsParam}`, '_blank');
                };
                btn.insertAdjacentElement('afterend', btnImprimir);
            }

            desabilitarRodadaGravada(n);
            salvarEstadoLocalStorage();
        }
    }
</script>
